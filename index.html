<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Açaí Control Campo V1.4</title><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#0f3d2e"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Açaí Campo"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><link rel="apple-touch-icon" href="icons/apple-touch-icon.png"><style>
:root{--bg:#07140c;--card:#102319;--card2:#163421;--txt:#f2fff5;--mut:#b7d5bf;--pri:#36b36b;--pri2:#77d18d;--warn:#f6c344;--bad:#ef6b6b;--line:#2d5a3a}*{box-sizing:border-box}body{margin:0;padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);padding-bottom:env(safe-area-inset-bottom);background:linear-gradient(180deg,#06110a,#0b2013);color:var(--txt);font-family:Arial,Helvetica,sans-serif;font-size:15px}header{position:sticky;top:0;z-index:5;background:#07140c;border-bottom:1px solid var(--line);padding:10px 12px}h1{font-size:19px;margin:0}.sub{color:var(--mut);font-size:12px;margin-top:3px}.faz{margin-top:8px;padding:8px;border:1px solid var(--line);border-radius:12px;background:#0b1a11;font-size:12px}.wrap{padding:10px;max-width:1080px;margin:auto}.tabs{display:flex;gap:8px;overflow-x:auto;padding:8px 0}.tabs button,.btn{border:1px solid var(--line);background:var(--card2);color:var(--txt);padding:11px 13px;border-radius:12px;font-weight:700;cursor:pointer;white-space:nowrap}.tabs button.active,.btn.primary{background:var(--pri);color:#031006;border-color:var(--pri)}.btn.warn{background:var(--warn);color:#201500}.btn.bad{background:var(--bad);color:#240000}.card{background:rgba(16,35,25,.96);border:1px solid var(--line);border-radius:16px;padding:12px;margin:10px 0}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.field{display:flex;flex-direction:column;gap:5px}label{font-size:12px;color:var(--mut);font-weight:700}input,select,textarea{width:100%;background:#06150c;color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:11px;font-size:15px}textarea{min-height:78px}.mut{color:var(--mut)}.kpi{background:#0b1a11;border:1px solid var(--line);border-radius:14px;padding:10px}.kpi b{font-size:20px;color:var(--pri2)}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid var(--line);padding:7px;text-align:left}th{color:var(--pri2)}.row{display:flex;gap:8px;flex-wrap:wrap}.hidden{display:none}.ok{color:var(--pri2)}.warnTxt{color:var(--warn)}.badTxt{color:var(--bad)}.pill{display:inline-block;padding:4px 8px;border-radius:999px;background:#092313;border:1px solid var(--line);font-size:12px}.receipt{background:#fff;color:#111;border-radius:8px;padding:14px;font-family:monospace;max-width:410px;margin:auto}.receipt h2{text-align:center;margin:4px 0}.receipt .line{border-top:1px dashed #333;margin:8px 0}.svgbox{background:#07140c;border:1px solid var(--line);border-radius:14px;height:330px;overflow:hidden}.footerSpace{height:30px}@media(max-width:760px){.grid,.grid3{grid-template-columns:1fr}table{font-size:12px}.tabs button{padding:10px}}@media print{body{background:#fff;color:#000}.no-print,header,.tabs,.card:not(.print-card){display:none!important}.print-card{border:0;box-shadow:none}.receipt{max-width:none;color:#000}.wrap{padding:0}}
</style></head><body><header><h1>🌿 Açaí Control Campo V1.4</h1><div class="sub">Multi-fazenda • Android/iOS • Offline • Recibo • Talhões poligonais • Sync</div><div class="faz" id="fazHeader"></div></header><div class="wrap"><div class="tabs no-print" id="tabs"></div><div id="view"></div><div class="footerSpace"></div></div><script>
(function(){'use strict';
var APP='ACAI_CONTROL_CAMPO_V14', TELA=28;
var empty={config:{apiUrl:'',deviceId:'',deviceNome:'',fazenda:null,lancadorPadrao:''},clientes:[],talhoes:[],propriedades:[],lancadores:[],vendas:[],gastos:[],sync:[],auditoria:[],alertas:[]};
var db, tab='resumo', lastReceipt=null;
function clone(o){return JSON.parse(JSON.stringify(o))};function load(){try{db=JSON.parse(localStorage.getItem(APP)||'null')||clone(empty)}catch(e){db=clone(empty)}Object.keys(empty).forEach(k=>{if(db[k]===undefined)db[k]=clone(empty[k])}); if(!db.config.deviceId){db.config.deviceId='DEV_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);save()}};function save(){localStorage.setItem(APP,JSON.stringify(db))};function id(p){return (p||'id')+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)};function today(){return new Date().toISOString().slice(0,10)};function time(){return new Date().toTimeString().slice(0,5)};function iso(){return new Date().toISOString()};function num(v){var n=parseFloat(String(v||'').replace(',','.'));return isNaN(n)?0:n};function brl(n){return Number(n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})};function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))};function gid(x){return document.getElementById(x)};function by(a,i){return (a||[]).find(x=>x.id===i)||null};function opt(a,val){return '<option value="">Selecione...</option>'+(a||[]).map(o=>'<option value="'+esc(o.id)+'" '+(o.id===val?'selected':'')+'>'+esc(o.nome||o.fazenda_nome||o.id)+'</option>').join('')};function faz(){return db.config.fazenda||null};function meta(){var f=faz()||{};return {consultoria_id:f.consultoria_id||'',consultoria_nome:f.consultoria_nome||'',proprietario_id:f.proprietario_id||'',proprietario_nome:f.proprietario_nome||'',fazenda_id:f.fazenda_id||'',fazenda_nome:f.fazenda_nome||'',chave_fazenda:f.chave_fazenda||''}}
function withMeta(o){var m=meta();Object.keys(m).forEach(k=>o[k]=m[k]);return o};function requireFaz(){if(!faz()){alert('Ative a fazenda antes de lançar dados.');tab='ativacao';render();return false}return true}
var tabs=[['resumo','Resumo'],['ativacao','Fazenda'],['venda','Nova venda'],['gasto','Novo gasto'],['clientes','Clientes'],['talhoes','Talhões'],['propriedades','Propriedades'],['lancadores','Lançadores'],['mapa','Mapa/GPS'],['pendencias','Pendências'],['config','Config'],['backup','Backup']];
function setTab(t){tab=t;render()};window.setTab=setTab;function renderTabs(){gid('tabs').innerHTML=tabs.map(t=>'<button class="'+(tab===t[0]?'active':'')+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>').join('')};function renderHeader(){var f=faz();gid('fazHeader').innerHTML=f?('<b>Fazenda:</b> '+esc(f.fazenda_nome)+' • <b>Chave:</b> '+esc(f.chave_fazenda)+' • <b>Lançador:</b> '+esc(db.config.lancadorPadrao||'N/D')+' • '+(navigator.onLine?'<span class="ok">Online</span>':'<span class="warnTxt">Offline</span>')):'<span class="warnTxt">Fazenda não ativada. Entre na aba Fazenda e informe a CHAVE_FAZENDA.</span>'}
function render(){renderHeader();renderTabs();var v=gid('view');var map={resumo:viewResumo,ativacao:viewAtivacao,venda:viewVenda,gasto:viewGasto,clientes:()=>viewCadastro('clientes'),talhoes:viewTalhoes,propriedades:viewPropriedades,lancadores:viewLancadores,mapa:viewMapa,pendencias:viewPendencias,config:viewConfig,backup:viewBackup};v.innerHTML=(map[tab]||viewResumo)();after()}
function sum(a,k){return (a||[]).reduce((s,x)=>s+num(x[k]),0)};function dataOk(x){return x.status!=='CANCELADO'};function filtr(a){var c=(faz()||{}).chave_fazenda;return !c?a:(a||[]).filter(x=>!x.chave_fazenda||x.chave_fazenda===c)};function totals(){var d=today(),m=d.slice(0,7),v=filtr(db.vendas).filter(dataOk),g=filtr(db.gastos).filter(dataOk);return {vDia:v.filter(x=>x.data===d),vMes:v.filter(x=>String(x.data).slice(0,7)===m),gDia:g.filter(x=>x.data===d),gMes:g.filter(x=>String(x.data).slice(0,7)===m),pend:db.sync.filter(x=>x.sync_status!=='SINCRONIZADO').length}}
function viewResumo(){var t=totals();return '<div class="grid3"><div class="kpi">Vendas hoje<br><b>'+brl(sum(t.vDia,'valor_liquido'))+'</b><br><span class="mut">'+sum(t.vDia,'kg_total').toFixed(1)+' kg</span></div><div class="kpi">Gastos hoje<br><b>'+brl(sum(t.gDia,'valor'))+'</b></div><div class="kpi">Pendências<br><b>'+t.pend+'</b></div></div>'+alertaDia()+'<div class="card"><h2>Atalhos</h2><div class="row"><button class="btn primary" onclick="setTab(\'venda\')">+ Venda</button><button class="btn" onclick="setTab(\'gasto\')">+ Gasto</button><button class="btn" onclick="setTab(\'pendencias\')">Sincronizar</button></div></div><div class="card"><h2>Últimas vendas desta fazenda</h2>'+table(filtr(db.vendas).slice(-8).reverse(),['data','cliente_nome','talhao_nome','kg_total','valor_liquido','sync_status'])+'</div>'}
function alertaDia(){var t=totals();return (new Date().getHours()>=18&&t.vDia.length===0)?'<div class="card"><b class="warnTxt">⚠ Atenção:</b> nenhum lançamento de saída de açaí foi registrado hoje nesta fazenda.</div>':''}
function viewAtivacao(){var f=faz()||{};return '<div class="card"><h2>Ativação da fazenda fixa</h2><p class="mut">Cada celular deve ficar vinculado a uma fazenda por CHAVE_FAZENDA. Todos os lançamentos carregarão essa chave automaticamente.</p><div class="grid"><div class="field"><label>URL do Apps Script</label><input id="apiUrlAt" value="'+esc(db.config.apiUrl)+'"></div><div class="field"><label>CHAVE_FAZENDA</label><input id="chaveAt" value="'+esc(f.chave_fazenda||'')+'" placeholder="ACAI-FAZ001-2026"></div><div class="field"><label>PIN opcional</label><input id="pinAt" type="password"></div><div class="field"><label>Nome do lançador</label><input id="lancAt" value="'+esc(db.config.lancadorPadrao||'')+'"></div><div class="field"><label>Nome do dispositivo</label><input id="devAt" value="'+esc(db.config.deviceNome||'Celular campo')+'"></div></div><div class="row" style="margin-top:10px"><button class="btn primary" onclick="validarChave()">Validar chave online</button><button class="btn warn" onclick="ativarManual()">Ativar manual/offline</button><button class="btn bad" onclick="trocarFazenda()">Trocar/limpar fazenda</button></div></div><div class="card"><h2>Fazenda ativa</h2>'+kv(f)+'</div>'}
window.validarChave=function(){var url=gid('apiUrlAt').value.trim(),ch=gid('chaveAt').value.trim(),pin=gid('pinAt').value.trim();db.config.apiUrl=url;db.config.lancadorPadrao=gid('lancAt').value.trim();db.config.deviceNome=gid('devAt').value.trim();if(!url||!ch)return alert('Informe URL do Apps Script e CHAVE_FAZENDA.');fetch(url+'?action=validarChave&chave_fazenda='+encodeURIComponent(ch)+'&pin='+encodeURIComponent(pin)).then(r=>r.json()).then(j=>{if(!j.ok)throw new Error(j.message||'Chave inválida');db.config.fazenda=j.fazenda;save();return fetch(url,{method:'POST',body:JSON.stringify({action:'ativarDispositivo',payload:Object.assign({device_id:db.config.deviceId,device_nome:db.config.deviceNome,lancador_nome:db.config.lancadorPadrao},meta())})})}).then(()=>{alert('Fazenda ativada.');render()}).catch(e=>alert('Erro: '+e.message))}
window.ativarManual=function(){var ch=gid('chaveAt').value.trim();if(!ch)return alert('Informe a chave.');db.config.apiUrl=gid('apiUrlAt').value.trim();db.config.lancadorPadrao=gid('lancAt').value.trim();db.config.deviceNome=gid('devAt').value.trim();db.config.fazenda={chave_fazenda:ch,fazenda_id:'PENDENTE_'+ch,fazenda_nome:'Fazenda pendente validação',proprietario_id:'',proprietario_nome:'',consultoria_id:'',consultoria_nome:'',status_ativacao:'PENDENTE_VALIDACAO'};audit('FAZENDA','ATIVACAO_MANUAL','',ch);save();render()}
window.trocarFazenda=function(){if(confirm('Trocar fazenda? Isso não apaga dados, mas novos lançamentos usarão nova chave.')){audit('FAZENDA','TROCA',JSON.stringify(db.config.fazenda||{}),'');db.config.fazenda=null;save();render()}}
function viewVenda(){if(!faz())return viewAtivacao();return '<div class="card"><h2>Nova venda / saída</h2><div class="grid"><div class="field"><label>Data</label><input id="data" type="date" value="'+today()+'"></div><div class="field"><label>Hora</label><input id="hora" type="time" value="'+time()+'"></div><div class="field"><label>Cliente</label><select id="cliente_id">'+opt(filtr(db.clientes))+'</select></div><div class="field"><label>Talhão</label><select id="talhao_id">'+opt(filtr(db.talhoes))+'</select></div><div class="field"><label>Propriedade</label><select id="propriedade_id">'+opt(filtr(db.propriedades))+'</select></div><div class="field"><label>Qualidade</label><select id="qualidade"><option>Convencional</option><option>Grosso</option><option>Médio</option><option>Fino</option><option>Preto</option><option>Roxo</option><option>Verde/misturado</option><option>Selecionado</option><option>Orgânico</option></select></div><div class="field"><label>Medida</label><select id="tipo_medida" onchange="calcVenda()"><option value="TELA">Tela</option><option value="MEIA_TELA">Meia tela</option><option value="KG">Kg</option><option value="PERSONALIZADO">Personalizado kg</option></select></div><div class="field"><label>Quantidade</label><input id="quantidade" type="number" step="0.001" oninput="calcVenda()"></div><div class="field"><label>Kg total</label><input id="kg_total" readonly></div><div class="field"><label>Telas equivalentes</label><input id="telas_equivalentes" readonly></div><div class="field"><label>Preço por tela</label><input id="preco_tela" type="number" step="0.01" oninput="calcVenda()"></div><div class="field"><label>Preço por kg</label><input id="preco_kg" type="number" step="0.01" oninput="calcVenda()"></div><div class="field"><label>Desconto</label><input id="desconto" type="number" step="0.01" value="0" oninput="calcVenda()"></div><div class="field"><label>Valor recebido</label><input id="valor_recebido" type="number" step="0.01" value="0" oninput="calcVenda()"></div><div class="field"><label>Valor bruto</label><input id="valor_bruto" readonly></div><div class="field"><label>Valor líquido</label><input id="valor_liquido" readonly></div><div class="field"><label>Valor pendente</label><input id="valor_pendente" readonly></div><div class="field"><label>Forma pagamento</label><select id="forma_pagamento"><option>Dinheiro</option><option>Pix</option><option>Prazo</option><option>Cartão</option><option>Troca</option><option>Outro</option></select></div><div class="field"><label>Situação</label><select id="situacao_pagamento"><option>Pago</option><option>Pendente</option><option>Parcial</option></select></div><div class="field"><label>Lançador</label><select id="lancador_id">'+opt(filtr(db.lancadores))+'</select></div></div><div class="field"><label>Observação</label><textarea id="observacao"></textarea></div><div class="row" style="margin-top:10px"><button class="btn" onclick="capturarGPS()">Capturar GPS</button><button class="btn primary" onclick="salvarVenda(true)">Salvar e gerar recibo</button><button class="btn" onclick="salvarVenda(false)">Salvar venda</button></div><input id="latitude" type="hidden"><input id="longitude" type="hidden"><input id="precisao_gps" type="hidden"><input id="status_gps" type="hidden" value="SEM_GPS"></div>'+(lastReceipt?'<div class="card print-card">'+receiptHtml(lastReceipt)+'</div><div class="row no-print"><button class="btn" onclick="window.print()">Imprimir/salvar PDF</button><button class="btn" onclick="compartilharRecibo()">Compartilhar texto</button><button class="btn" onclick="copiarRecibo()">Copiar recibo</button></div>':'')}
window.calcVenda=function(){var tipo=gid('tipo_medida').value,q=num(gid('quantidade').value),pt=num(gid('preco_tela').value),pk=num(gid('preco_kg').value),desc=num(gid('desconto').value),rec=num(gid('valor_recebido').value);var kg=(tipo==='TELA'?q*TELA:(tipo==='MEIA_TELA'?q*14:q));if(pt>0&&!pk){pk=pt/TELA;gid('preco_kg').value=pk.toFixed(2)};if(pk>0&&!pt){pt=pk*TELA;gid('preco_tela').value=pt.toFixed(2)};var bruto=kg*pk,liq=Math.max(0,bruto-desc),pend=Math.max(0,liq-rec);gid('kg_total').value=kg.toFixed(2);gid('telas_equivalentes').value=(kg/TELA).toFixed(3);gid('valor_bruto').value=bruto.toFixed(2);gid('valor_liquido').value=liq.toFixed(2);gid('valor_pendente').value=pend.toFixed(2)}
window.capturarGPS=function(){if(!navigator.geolocation){gid('status_gps').value='GPS_INDISPONIVEL';return alert('GPS indisponível neste navegador. No iPhone, abra pelo Safari em HTTPS.')}gid('status_gps').value='BUSCANDO_GPS';navigator.geolocation.getCurrentPosition(p=>{gid('latitude').value=p.coords.latitude;gid('longitude').value=p.coords.longitude;gid('precisao_gps').value=p.coords.accuracy;gid('status_gps').value=(p.coords.accuracy&&p.coords.accuracy>80)?'GPS_IMPRECISO':'GPS_CAPTURADO';alert('GPS capturado. Precisão: '+Math.round(p.coords.accuracy||0)+' m')},err=>{var st=err&&err.code===1?'GPS_NEGADO':(err&&err.code===3?'GPS_TIMEOUT':'GPS_INDISPONIVEL');gid('status_gps').value=st;alert('GPS não capturado: '+st+'. O lançamento pode continuar sem GPS.')},{enableHighAccuracy:true,timeout:15000,maximumAge:30000})}
window.salvarVenda=function(recibo){if(!requireFaz())return;calcVenda();var cli=by(db.clientes,gid('cliente_id').value)||{},tal=by(db.talhoes,gid('talhao_id').value)||{},prop=by(db.propriedades,gid('propriedade_id').value)||{},lan=by(db.lancadores,gid('lancador_id').value)||{};var o=withMeta({id:id('VEN'),data:gid('data').value,hora:gid('hora').value,cliente_id:cli.id||'',cliente_nome:cli.nome||'',talhao_id:tal.id||'',talhao_nome:tal.nome||'',propriedade_id:prop.id||'',propriedade_nome:prop.nome||'',tipo_medida:gid('tipo_medida').value,quantidade:num(gid('quantidade').value),kg_total:num(gid('kg_total').value),telas_equivalentes:num(gid('telas_equivalentes').value),qualidade:gid('qualidade').value,preco_kg:num(gid('preco_kg').value),preco_tela:num(gid('preco_tela').value),valor_bruto:num(gid('valor_bruto').value),desconto:num(gid('desconto').value),valor_liquido:num(gid('valor_liquido').value),valor_recebido:num(gid('valor_recebido').value),valor_pendente:num(gid('valor_pendente').value),forma_pagamento:gid('forma_pagamento').value,situacao_pagamento:gid('situacao_pagamento').value,lancador_id:lan.id||'',lancador_nome:lan.nome||db.config.lancadorPadrao||'',observacao:gid('observacao').value,latitude:gid('latitude').value,longitude:gid('longitude').value,precisao_gps:gid('precisao_gps').value,status_gps:gid('status_gps').value||'SEM_GPS',origem:'CAMPO',status:'ATIVO',sync_status:'PENDENTE',criado_em:iso(),atualizado_em:iso()});db.vendas.push(o);queue('vendas',o);save();if(recibo)lastReceipt=o;alert('Venda salva.');tab='venda';render()}
function receiptHtml(o){return '<div class="receipt"><h2>RECIBO AÇAÍ CONTROL</h2><div class="line"></div><b>Fazenda:</b> '+esc(o.fazenda_nome)+'<br><b>Chave:</b> '+esc(o.chave_fazenda)+'<br><b>Proprietário:</b> '+esc(o.proprietario_nome)+'<div class="line"></div><b>Cliente:</b> '+esc(o.cliente_nome)+'<br><b>Talhão:</b> '+esc(o.talhao_nome)+'<br><b>Data:</b> '+esc(o.data)+' '+esc(o.hora)+'<br><b>Kg:</b> '+num(o.kg_total).toFixed(2)+'<br><b>Telas:</b> '+num(o.telas_equivalentes).toFixed(3)+'<br><b>Preço/kg:</b> '+brl(o.preco_kg)+'<br><b>Valor líquido:</b> '+brl(o.valor_liquido)+'<br><b>Recebido:</b> '+brl(o.valor_recebido)+'<br><b>Pendente:</b> '+brl(o.valor_pendente)+'<br><b>Lançador:</b> '+esc(o.lancador_nome)+'<div class="line"></div><small>ID: '+esc(o.id)+'</small></div>'}
function reciboTexto(){if(!lastReceipt)return '';var o=lastReceipt;return 'RECIBO AÇAÍ CONTROL\nFazenda: '+o.fazenda_nome+'\nChave: '+o.chave_fazenda+'\nProprietário: '+o.proprietario_nome+'\nCliente: '+o.cliente_nome+'\nTalhão: '+o.talhao_nome+'\nData: '+o.data+' '+o.hora+'\nKg: '+o.kg_total+'\nTelas: '+o.telas_equivalentes+'\nPreço/kg: '+brl(o.preco_kg)+'\nValor: '+brl(o.valor_liquido)+'\nRecebido: '+brl(o.valor_recebido)+'\nPendente: '+brl(o.valor_pendente)+'\nLançador: '+o.lancador_nome+'\nID: '+o.id}window.compartilharRecibo=function(){var txt=reciboTexto();if(!txt)return;if(navigator.share)navigator.share({title:'Recibo Açaí Control',text:txt}).catch(()=>prompt('Copie o recibo:',txt));else prompt('Copie o recibo:',txt)};window.copiarRecibo=function(){var txt=reciboTexto();if(!txt)return;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(()=>alert('Recibo copiado.')).catch(()=>prompt('Copie o recibo:',txt));}else prompt('Copie o recibo:',txt)}
function viewGasto(){if(!faz())return viewAtivacao();return '<div class="card"><h2>Novo gasto</h2><div class="grid"><div class="field"><label>Data</label><input id="g_data" type="date" value="'+today()+'"></div><div class="field"><label>Hora</label><input id="g_hora" type="time" value="'+time()+'"></div><div class="field"><label>Categoria</label><select id="g_categoria"><option>Mão de obra</option><option>Colheita</option><option>Transporte</option><option>Combustível</option><option>Frete</option><option>Roçagem</option><option>Adubação</option><option>Insumos</option><option>Embalagem</option><option>Manutenção</option><option>Alimentação</option><option>Administrativo</option><option>Outros</option></select></div><div class="field"><label>Subcategoria</label><input id="g_subcategoria"></div><div class="field"><label>Valor</label><input id="g_valor" type="number" step="0.01"></div><div class="field"><label>Forma pagamento</label><select id="g_forma"><option>Dinheiro</option><option>Pix</option><option>Prazo</option><option>Cartão</option><option>Outro</option></select></div><div class="field"><label>Situação</label><select id="g_situacao"><option>Pago</option><option>Pendente</option><option>Parcial</option></select></div><div class="field"><label>Propriedade</label><select id="g_propriedade">'+opt(filtr(db.propriedades))+'</select></div><div class="field"><label>Talhão opcional</label><select id="g_talhao">'+opt(filtr(db.talhoes))+'</select></div><div class="field"><label>Lançador</label><select id="g_lancador">'+opt(filtr(db.lancadores))+'</select></div></div><div class="field"><label>Descrição</label><textarea id="g_descricao"></textarea></div><div class="field"><label>Observação</label><textarea id="g_obs"></textarea></div><button class="btn primary" onclick="salvarGasto()">Salvar gasto</button></div>'}
window.salvarGasto=function(){if(!requireFaz())return;var prop=by(db.propriedades,gid('g_propriedade').value)||{},tal=by(db.talhoes,gid('g_talhao').value)||{},lan=by(db.lancadores,gid('g_lancador').value)||{};var o=withMeta({id:id('GAS'),data:gid('g_data').value,hora:gid('g_hora').value,categoria:gid('g_categoria').value,subcategoria:gid('g_subcategoria').value,descricao:gid('g_descricao').value,valor:num(gid('g_valor').value),forma_pagamento:gid('g_forma').value,situacao_pagamento:gid('g_situacao').value,propriedade_id:prop.id||'',propriedade_nome:prop.nome||'',talhao_id:tal.id||'',talhao_nome:tal.nome||'',lancador_id:lan.id||'',lancador_nome:lan.nome||db.config.lancadorPadrao||'',observacao:gid('g_obs').value,latitude:'',longitude:'',status:'ATIVO',sync_status:'PENDENTE',criado_em:iso(),atualizado_em:iso()});db.gastos.push(o);queue('gastos',o);save();alert('Gasto salvo.');render()}
function viewCadastro(tipo){if(!faz())return viewAtivacao();var label=tipo==='clientes'?'Cliente':tipo;return '<div class="card"><h2>Novo '+label+'</h2><div class="grid"><div class="field"><label>Nome</label><input id="cad_nome"></div><div class="field"><label>Telefone</label><input id="cad_tel"></div><div class="field"><label>Localidade</label><input id="cad_loc"></div><div class="field"><label>Tipo</label><input id="cad_tipo" value="Cliente final"></div></div><div class="field"><label>Observação</label><textarea id="cad_obs"></textarea></div><button class="btn primary" onclick="salvarCadastro(\''+tipo+'\')">Salvar</button></div><div class="card"><h2>Cadastrados</h2>'+table(filtr(db[tipo]),['nome','telefone','localidade','tipo','status'])+'</div>'}
window.salvarCadastro=function(tipo){if(!requireFaz())return;var o=withMeta({id:id(tipo.slice(0,3).toUpperCase()),nome:gid('cad_nome').value,telefone:gid('cad_tel').value,localidade:gid('cad_loc').value,tipo:gid('cad_tipo').value,observacao:gid('cad_obs').value,status:'ATIVO',criado_em:iso(),atualizado_em:iso()});db[tipo].push(o);queue(tipo,o);save();render()}
function viewPropriedades(){if(!faz())return viewAtivacao();return '<div class="card"><h2>Nova propriedade</h2><div class="grid"><div class="field"><label>Nome</label><input id="p_nome"></div><div class="field"><label>Município</label><input id="p_municipio"></div><div class="field"><label>Comunidade</label><input id="p_comunidade"></div><div class="field"><label>Responsável</label><input id="p_responsavel"></div><div class="field"><label>Área total ha</label><input id="p_area" type="number" step="0.01"></div><div class="field"><label>Latitude</label><input id="p_lat"></div><div class="field"><label>Longitude</label><input id="p_lng"></div></div><div class="field"><label>GeoJSON</label><textarea id="p_geo"></textarea></div><button class="btn primary" onclick="salvarProp()">Salvar propriedade</button></div><div class="card"><h2>Propriedades</h2>'+table(filtr(db.propriedades),['nome','municipio','area_total_ha','chave_fazenda'])+'</div>'}
window.salvarProp=function(){var o=withMeta({id:id('PRO'),nome:gid('p_nome').value,municipio:gid('p_municipio').value,comunidade:gid('p_comunidade').value,responsavel:gid('p_responsavel').value,area_total_ha:num(gid('p_area').value),latitude:gid('p_lat').value,longitude:gid('p_lng').value,geojson:gid('p_geo').value,observacao:'',status:'ATIVO',criado_em:iso(),atualizado_em:iso()});db.propriedades.push(o);queue('propriedades',o);save();render()}
function viewLancadores(){if(!faz())return viewAtivacao();return '<div class="card"><h2>Novo lançador</h2><div class="grid"><div class="field"><label>Nome</label><input id="l_nome"></div><div class="field"><label>Telefone</label><input id="l_tel"></div><div class="field"><label>Função</label><select id="l_funcao"><option>Proprietário</option><option>Funcionário</option><option>Colhedor</option><option>Vendedor</option><option>Administrador</option></select></div><div class="field"><label>Permissão</label><select id="l_perm"><option>Apenas lançar</option><option>Lançar e editar</option><option>Administrador</option></select></div></div><button class="btn primary" onclick="salvarLancador()">Salvar lançador</button></div><div class="card"><h2>Lançadores</h2>'+table(filtr(db.lancadores),['nome','telefone','funcao','permissao'])+'</div>'}
window.salvarLancador=function(){var o=withMeta({id:id('LAN'),nome:gid('l_nome').value,telefone:gid('l_tel').value,funcao:gid('l_funcao').value,permissao:gid('l_perm').value,status:'ATIVO',criado_em:iso(),atualizado_em:iso()});db.lancadores.push(o);queue('lancadores',o);db.config.lancadorPadrao=o.nome;save();render()}
function viewTalhoes(){if(!faz())return viewAtivacao();return '<div class="card"><h2>Novo talhão poligonal</h2><p class="mut">Talhão é área. Informe coordenadas do polígono em linhas lat,lng. O ponto GPS é apenas apoio/centroide.</p><div class="grid"><div class="field"><label>Nome</label><input id="t_nome"></div><div class="field"><label>Código</label><input id="t_codigo"></div><div class="field"><label>Propriedade</label><select id="t_prop">'+opt(filtr(db.propriedades))+'</select></div><div class="field"><label>Área ha informada</label><input id="t_area" type="number" step="0.01"></div><div class="field"><label>Situação</label><select id="t_sit"><option>Produzindo</option><option>Em formação</option><option>Baixa produção</option><option>Recuperação</option><option>Inativo</option></select></div><div class="field"><label>Tipo de açaí</label><input id="t_tipo"></div><div class="field"><label>Ano plantio</label><input id="t_ano"></div><div class="field"><label>Latitude centroide</label><input id="t_lat"></div><div class="field"><label>Longitude centroide</label><input id="t_lng"></div></div><div class="field"><label>Polígono lat,lng por linha</label><textarea id="t_poly" placeholder="-1.234,-47.123\n-1.235,-47.124\n-1.236,-47.122"></textarea></div><div class="row"><button class="btn" onclick="previewPoly()">Pré-visualizar</button><button class="btn primary" onclick="salvarTalhao()">Salvar talhão</button></div><div id="polyPrev" class="svgbox"></div></div><div class="card"><h2>Talhões</h2>'+table(filtr(db.talhoes),['nome','area_ha','tem_poligono','chave_fazenda'])+'</div>'}
function parsePoly(txt){return String(txt||'').split(/\n|;/).map(l=>l.trim()).filter(Boolean).map(l=>{var p=l.split(',');return [num(p[1]),num(p[0])]})};function geojsonFrom(coords){return coords.length?JSON.stringify({type:'Polygon',coordinates:[coords.concat([coords[0]])]}):''};function areaApprox(coords){if(coords.length<3)return 0;var a=0;for(var i=0;i<coords.length;i++){var j=(i+1)%coords.length;a+=coords[i][0]*coords[j][1]-coords[j][0]*coords[i][1]}return Math.abs(a)*111*111/2}
window.previewPoly=function(){var coords=parsePoly(gid('t_poly').value);gid('polyPrev').innerHTML=svgPolys([{nome:'Prévia',coords:coords,metricas:{}}])}
window.salvarTalhao=function(){var prop=by(db.propriedades,gid('t_prop').value)||{},coords=parsePoly(gid('t_poly').value),area=num(gid('t_area').value)||areaApprox(coords);var o=withMeta({id:id('TAL'),nome:gid('t_nome').value,codigo:gid('t_codigo').value,propriedade_id:prop.id||'',propriedade_nome:prop.nome||'',area_ha:area,situacao_produtiva:gid('t_sit').value,tipo_acai:gid('t_tipo').value,ano_plantio:gid('t_ano').value,latitude:gid('t_lat').value,longitude:gid('t_lng').value,geojson:geojsonFrom(coords),tem_poligono:coords.length>=3?'SIM':'NAO',observacao:'',status:'ATIVO',criado_em:iso(),atualizado_em:iso()});db.talhoes.push(o);queue('talhoes',o);save();render()}
function metricasTalhao(t){var vs=filtr(db.vendas).filter(v=>v.talhao_id===t.id&&dataOk(v)),gs=filtr(db.gastos).filter(g=>g.talhao_id===t.id&&dataOk(g));var kg=sum(vs,'kg_total'),rec=sum(vs,'valor_liquido'),gas=sum(gs,'valor'),luc=rec-gas,area=num(t.area_ha);return {kg:kg,telas:kg/TELA,receita:rec,gastos:gas,lucro:luc,kgHa:area?kg/area:0,lucroHa:area?luc/area:0,custoKg:kg?gas/kg:0,lucroKg:kg?luc/kg:0}}
function viewMapa(){var ts=filtr(db.talhoes).map(t=>{var coords=[];try{var g=JSON.parse(t.geojson||'{}');coords=(g.coordinates&&g.coordinates[0]||[]).map(c=>[c[0],c[1]])}catch(e){}return {id:t.id,nome:t.nome,coords:coords,metricas:metricasTalhao(t)}}).filter(t=>t.coords.length>=3);return '<div class="card"><h2>Mapa produtivo da fazenda</h2><p class="mut">Clique no polígono do talhão para ver produção, receita, gasto e lucro.</p><div class="svgbox">'+svgPolys(ts)+'</div><div id="talhaoInfo" class="card"><span class="mut">Selecione um talhão no mapa.</span></div></div>'}
function svgPolys(list){if(!list.length)return '<p class="mut" style="padding:12px">Nenhum polígono cadastrado.</p>';var all=[];list.forEach(p=>all=all.concat(p.coords));var xs=all.map(c=>c[0]),ys=all.map(c=>c[1]);var minx=Math.min.apply(null,xs),maxx=Math.max.apply(null,xs),miny=Math.min.apply(null,ys),maxy=Math.max.apply(null,ys),w=1000,h=430,pad=30;function X(x){return pad+(x-minx)/((maxx-minx)||1)*(w-2*pad)};function Y(y){return h-(pad+(y-miny)/((maxy-miny)||1)*(h-2*pad))};var s='<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="100%"><rect width="100%" height="100%" fill="#06150c"/>';list.forEach(p=>{var pts=p.coords.map(c=>X(c[0])+','+Y(c[1])).join(' '),m=p.metricas||{},fill=!m.kg?'rgba(170,170,170,.30)':m.lucro<0?'rgba(239,107,107,.38)':m.lucro===0?'rgba(246,195,68,.34)':'rgba(54,179,107,.38)';s+='<polygon points="'+pts+'" fill="'+fill+'" stroke="#77d18d" stroke-width="3" style="cursor:pointer" onclick="abrirTalhao(\''+esc(p.id)+'\')"><title>'+esc(p.nome)+' • '+(m.kg||0).toFixed(0)+' kg • '+brl(m.lucro||0)+'</title></polygon><text x="'+X(p.coords[0][0])+'" y="'+Y(p.coords[0][1])+'" fill="#fff" font-weight="bold">'+esc(p.nome)+'</text>'});return s+'</svg>'}
window.abrirTalhao=function(tid){var t=by(db.talhoes,tid);if(!t)return;var m=metricasTalhao(t);gid('talhaoInfo').innerHTML='<h3>'+esc(t.nome)+'</h3><div class="grid3"><div class="kpi">Área<br><b>'+num(t.area_ha).toFixed(2)+' ha</b></div><div class="kpi">Produção<br><b>'+m.kg.toFixed(1)+' kg</b><br><span class="mut">'+m.telas.toFixed(2)+' telas</span></div><div class="kpi">Kg/ha<br><b>'+m.kgHa.toFixed(1)+'</b></div><div class="kpi">Receita<br><b>'+brl(m.receita)+'</b></div><div class="kpi">Gastos<br><b>'+brl(m.gastos)+'</b></div><div class="kpi">Lucro<br><b>'+brl(m.lucro)+'</b></div></div>'}
function viewPendencias(){return '<div class="card"><h2>Pendências</h2><p>'+db.sync.filter(x=>x.sync_status!=='SINCRONIZADO').length+' registros pendentes.</p><button class="btn primary" onclick="sincronizar()">Sincronizar agora</button></div><div class="card">'+table(db.sync.slice(-30).reverse(),['entidade','entidade_id','sync_status','mensagem'])+'</div>'}
function queue(ent,o){db.sync.push({id:id('SYN'),entidade:ent,entidade_id:o.id,payload:o,sync_status:'PENDENTE',mensagem:'',criado_em:iso()})}
window.sincronizar=function(){if(!db.config.apiUrl)return alert('Configure a URL do Apps Script.');var items=db.sync.filter(x=>x.sync_status!=='SINCRONIZADO').map(x=>({entidade:x.entidade,payload:x.payload}));if(!items.length)return alert('Nada pendente.');fetch(db.config.apiUrl,{method:'POST',body:JSON.stringify({action:'syncLote',items:items,device_id:db.config.deviceId})}).then(r=>r.json()).then(j=>{if(!j.ok)throw new Error(j.message||'Falha');db.sync.forEach(x=>{if(x.sync_status!=='SINCRONIZADO'){x.sync_status='SINCRONIZADO';x.mensagem='Enviado'}});['vendas','gastos','clientes','talhoes','propriedades','lancadores'].forEach(ent=>db[ent].forEach(o=>o.sync_status='SINCRONIZADO'));save();alert('Sincronizado.');render()}).catch(e=>alert('Erro sync: '+e.message))}
function viewConfig(){return '<div class="card"><h2>Configurações</h2><div class="field"><label>URL Apps Script</label><input id="cfg_api" value="'+esc(db.config.apiUrl)+'"></div><div class="field"><label>Lançador padrão</label><input id="cfg_lan" value="'+esc(db.config.lancadorPadrao)+'"></div><button class="btn primary" onclick="salvarConfig()">Salvar</button></div>'};window.salvarConfig=function(){db.config.apiUrl=gid('cfg_api').value;db.config.lancadorPadrao=gid('cfg_lan').value;save();render()}
function viewBackup(){return '<div class="card"><h2>Backup</h2><button class="btn" onclick="baixarJSON()">Baixar JSON</button><button class="btn" onclick="baixarCSV()">Baixar vendas CSV</button><label class="btn">Importar JSON<input class="hidden" type="file" onchange="importarJSON(this.files[0])"></label></div>'};window.baixarJSON=function(){download('acai_campo_backup_v14.json',JSON.stringify(db,null,2),'application/json')};window.baixarCSV=function(){download('vendas_acai.csv',csv(db.vendas),'text/csv')};window.importarJSON=function(f){var r=new FileReader();r.onload=function(){db=JSON.parse(r.result);save();render()};r.readAsText(f)};function download(n,t,m){var blob=new Blob([t],{type:m}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=n;document.body.appendChild(a);try{a.click();setTimeout(()=>{URL.revokeObjectURL(url);a.remove()},1000)}catch(e){var w=window.open();if(w){w.document.write('<pre>'+esc(t)+'</pre>')}else prompt('Copie o conteúdo do backup:',t)}};function csv(a){if(!a.length)return '';var h=Object.keys(a[0]);return h.join(';')+'\n'+a.map(o=>h.map(k=>String(o[k]||'').replace(/;/g,',')).join(';')).join('\n')}
function table(a,cols){if(!a||!a.length)return '<p class="mut">Sem registros.</p>';return '<div style="overflow:auto"><table><thead><tr>'+cols.map(c=>'<th>'+c+'</th>').join('')+'</tr></thead><tbody>'+a.map(o=>'<tr>'+cols.map(c=>'<td>'+esc(o[c])+'</td>').join('')+'</tr>').join('')+'</tbody></table></div>'};function kv(o){if(!o||!Object.keys(o).length)return '<p class="mut">Não ativada.</p>';return '<table>'+Object.keys(o).map(k=>'<tr><th>'+esc(k)+'</th><td>'+esc(o[k])+'</td></tr>').join('')+'</table>'};function audit(ent,acao,ant,novo){db.auditoria.push(withMeta({id:id('AUD'),data:today(),hora:time(),entidade:ent,acao:acao,valor_anterior:ant,valor_novo:novo,usuario:db.config.lancadorPadrao,origem:'CAMPO'}))}
function after(){}load();render();if('serviceWorker'in navigator)navigator.serviceWorker.register('service-worker.js').catch(()=>{});
})();
</script></body></html>
